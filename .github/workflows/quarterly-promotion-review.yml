name: Quarterly Promotion Review

on:
  schedule:
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      reviewer_days:
        description: 'Days to look back for activity (default: 90)'
        required: false
        default: '90'
        type: string
      inactive_days:
        description: 'Days to consider inactive (default: 365)'
        required: false
        default: '365'
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.x'

      - name: Run promotion check
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--output markdown"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.reviewer_days }}" ]; then
              ARGS="${ARGS} --reviewer-days ${{ github.event.inputs.reviewer_days }}"
            fi
            if [ -n "${{ github.event.inputs.inactive_days }}" ]; then
              ARGS="${ARGS} --inactive-days ${{ github.event.inputs.inactive_days }}"
            fi
          fi
          python3 scripts/python/governance-check.py ${ARGS} > report.md

      - name: Determine quarter label
        id: quarter
        run: |
          QUARTER="Q$(( ($(date +%-m) - 1) / 3 + 1 )) $(date +%Y)"
          echo "label=${QUARTER}" >> "$GITHUB_OUTPUT"

      - name: Check if report has content
        id: check
        run: |
          if grep -q "No open promotion requests found" report.md && \
             grep -q "All maintainers are active" report.md; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create summary issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Quarterly Promotion Review — ${{ steps.quarter.outputs.label }}"
          ISSUE_URL=$(gh issue create \
            --title "${TITLE}" \
            --body-file report.md \
            --label "quarterly-review")

          if [ "${{ steps.check.outputs.empty }}" = "true" ]; then
            gh issue close "${ISSUE_URL}" \
              --comment "No open promotion requests and no inactive maintainers. Auto-closing."
          fi
