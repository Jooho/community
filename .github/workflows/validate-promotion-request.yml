name: Validate Promotion Request

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      username:
        description: 'Username to validate (without @)'
        required: true
        type: string
      target_role:
        description: 'Target role for promotion'
        required: true
        type: choice
        options:
          - reviewer
          - approver
      issue_number:
        description: 'Issue number to comment on (optional)'
        required: false
        type: string

jobs:
  validate:
    if: startsWith(github.event.issue.title, 'REQUEST: Promotion to')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.x'

      - name: Parse issue title or use manual inputs
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            USERNAME="${{ github.event.inputs.username }}"
            TARGET="${{ github.event.inputs.target_role }}"
          else
            TITLE="${{ github.event.issue.title }}"
            USERNAME=$(echo "${TITLE}" | sed -n 's/.*for @*\([^ ]*\)/\1/p')
            TARGET=$(echo "${TITLE}" | sed -n 's/.*Promotion to \([^ ]*\).*/\1/p' | tr '[:upper:]' '[:lower:]')
          fi
          echo "username=${USERNAME}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

      - name: Run promotion check
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/python/governance-check.py \
            --user "${{ steps.parse.outputs.username }}" \
            --target "${{ steps.parse.outputs.target }}" \
            --output markdown > validation.md

      - name: Post validation comment or show result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "=== Manual Validation Result ==="
            cat validation.md
            if [ -n "${{ github.event.inputs.issue_number }}" ]; then
              echo "Posting to issue #${{ github.event.inputs.issue_number }}..."
              gh issue comment ${{ github.event.inputs.issue_number }} --body-file validation.md
            fi
          else
            gh issue comment ${{ github.event.issue.number }} --body-file validation.md
          fi
