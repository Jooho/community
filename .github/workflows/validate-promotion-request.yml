name: Validate Promotion Request

on:
  issues:
    types: [opened]

jobs:
  validate:
    if: startsWith(github.event.issue.title, 'REQUEST: Promotion to')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.x'

      - name: Parse issue title
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          USERNAME=$(echo "${TITLE}" | sed -n 's/.*for @*\([^ ]*\)/\1/p')
          TARGET=$(echo "${TITLE}" | sed -n 's/.*Promotion to \([^ ]*\).*/\1/p' | tr '[:upper:]' '[:lower:]')
          echo "username=${USERNAME}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

      - name: Run promotion check
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/python/governance-check.py \
            --user "${{ steps.parse.outputs.username }}" \
            --target "${{ steps.parse.outputs.target }}" \
            --output markdown > validation.md

      - name: Post validation comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body-file validation.md
